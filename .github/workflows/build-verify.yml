name: Build Verify

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  release-package-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        env:
          VITE_APP_VERSION: build-verify
        run: npm run build

      - name: Verify release package targets
        run: |
          set -euo pipefail

          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          VERSION="build-verify"
          COMMIT="${GITHUB_SHA}"
          mkdir -p release-verify release-work

          build_target() {
            local goos="$1"
            local goarch="$2"
            local ext="$3"
            local package_name="ChatGptImageStudio-${VERSION}-${goos}-${goarch}"
            local stage_dir="release-work/${package_name}"
            local binary_name="chatgpt-image-studio${ext}"

            rm -rf "${stage_dir}"
            mkdir -p "${stage_dir}/data" "${stage_dir}/static"

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -C backend -trimpath \
              -ldflags="-s -w -X chatgpt2api/internal/buildinfo.Version=${VERSION} -X chatgpt2api/internal/buildinfo.Commit=${COMMIT} -X chatgpt2api/internal/buildinfo.BuildTime=${BUILD_TIME}" \
              -o "../${stage_dir}/${binary_name}" .

            cp backend/internal/config/config.defaults.toml "${stage_dir}/data/config.example.toml"
            cp packaging/README.txt "${stage_dir}/README.txt"
            cp -R web/dist/. "${stage_dir}/static/"

            test -f "${stage_dir}/${binary_name}"
            test -f "${stage_dir}/data/config.example.toml"
            test -f "${stage_dir}/static/index.html"

            (
              cd "${stage_dir}"
              zip -rq "../../release-verify/${package_name}.zip" .
            )
          }

          build_target windows amd64 .exe
          build_target windows arm64 .exe
          build_target linux amd64 ""
          build_target linux arm64 ""
          build_target darwin amd64 ""
          build_target darwin arm64 ""

      - name: Upload release verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-verify
          path: release-verify/*.zip
          if-no-files-found: error

  docker-amd64-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: linux/amd64
          tags: chatgpt-image-studio:verify-amd64
          build-args: |
            VERSION=build-verify
            COMMIT=${{ github.sha }}
            BUILD_TIME=build-verify

      - name: Smoke test amd64 image contents
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /bin/sh chatgpt-image-studio:verify-amd64 -c \
            'uname -m && \
             test -x /app/chatgpt2api-studio && \
             test -f /app/data/config.example.toml && \
             test -f /app/static/index.html'

  docker-multiarch-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=build-verify
            COMMIT=${{ github.sha }}
            BUILD_TIME=build-verify
