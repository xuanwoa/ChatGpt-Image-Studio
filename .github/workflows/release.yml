name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: npm run build

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          mkdir -p release-assets release-work

          build_target() {
            local goos="$1"
            local goarch="$2"
            local ext="$3"
            local package_name="ChatGptImageStudio-${VERSION}-${goos}-${goarch}"
            local stage_dir="release-work/${package_name}"
            local binary_name="chatgpt-image-studio${ext}"

            rm -rf "${stage_dir}"
            mkdir -p "${stage_dir}/data" "${stage_dir}/static"

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -C backend -trimpath \
              -ldflags="-s -w -X chatgpt2api/internal/buildinfo.Version=${VERSION} -X chatgpt2api/internal/buildinfo.Commit=${COMMIT} -X chatgpt2api/internal/buildinfo.BuildTime=${BUILD_TIME}" \
              -o "../${stage_dir}/${binary_name}" .

            cp backend/internal/config/config.defaults.toml "${stage_dir}/data/config.example.toml"
            cp packaging/README.txt "${stage_dir}/README.txt"
            cp -R web/dist/. "${stage_dir}/static/"

            (
              cd "${stage_dir}"
              zip -rq "../../release-assets/${package_name}.zip" .
            )
          }

          build_target windows amd64 .exe
          build_target windows arm64 .exe
          build_target linux amd64 ""
          build_target linux arm64 ""
          build_target darwin amd64 ""
          build_target darwin arm64 ""

          sha256sum release-assets/*.zip > release-assets/checksums.txt

      - name: Prepare release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          NOTES_SOURCE=".github/release-notes/${VERSION}.md"
          NOTES_TARGET="release-assets/release-notes.md"

          if [ -f "${NOTES_SOURCE}" ]; then
            cp "${NOTES_SOURCE}" "${NOTES_TARGET}"
          else
            {
              echo "## 更新内容"
              echo
              echo "- 发布版本：${VERSION}"
            } > "${NOTES_TARGET}"
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-assets/release-notes.md
          files: |
            release-assets/*.zip
            release-assets/checksums.txt
